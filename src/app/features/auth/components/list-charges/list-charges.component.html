<mat-card appearance="outlined">
  <mat-card-header>
    <button matButton="filled" (click)="openCreateChargeDialog()">
      <mat-icon>add</mat-icon>
      Criar cobranças
    </button>
  </mat-card-header>
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">


    <ng-container matColumnDef="position">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let element"> {{ element.position }}</td>
    </ng-container>

    <ng-container matColumnDef="client">
      <th mat-header-cell *matHeaderCellDef> Cliente</th>
      <td mat-cell *matCellDef="let element"> {{ element?.client.name }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Status</th>
      <td mat-cell *matCellDef="let element"> {{ element?.status }}</td>
    </ng-container>

    <ng-container matColumnDef="totalValue">
      <th mat-header-cell *matHeaderCellDef> Valor Total</th>
      <td mat-cell *matCellDef="let element"> {{ element?.totalValue }}</td>
    </ng-container>

    <ng-container matColumnDef="createdAt">
      <th mat-header-cell *matHeaderCellDef> Criada em</th>
      <td mat-cell *matCellDef="let element"> {{ element?.createdAt }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let element">
        <button matButton="filled" (click)="openManualLiquidateDialog(element)"
                [disabled]="element?.status !== 'waitingPayment'">Liquidar
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
  <mat-card-actions>
  </mat-card-actions>
</mat-card>
