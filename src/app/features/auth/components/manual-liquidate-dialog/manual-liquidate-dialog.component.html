<mat-card appearance="outlined">
  <div class="card-container">
    @if (isLoading) {
      <div class="loading-overlay">
        <mat-spinner diameter="40"></mat-spinner>
      </div>
    }

    <mat-card-header>
      <mat-card-title>Liquidar manualmente</mat-card-title>
    </mat-card-header>

    <mat-card-content class="dialog-content">
      <mat-form-field appearance="outline">
        <mat-label>Id</mat-label>
        <input type="text" matInput [value]="data?._id" disabled>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Cliente</mat-label>
        <input type="text" matInput [value]="data?.client?.name" disabled>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Valor Total</mat-label>
        <input type="text" matInput [value]="data?.totalValue" disabled>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Status</mat-label>
        <input type="text" matInput [value]="data?.status" disabled>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Método de Pagamento</mat-label>
        <mat-select [formControl]="paymentMethodControl">
          @for (method of availableMethods; track method.value) {
            <mat-option [value]="method.value">{{ method.label }}</mat-option>
          }
        </mat-select>
        @if (paymentMethodControl.hasError('required') && paymentMethodControl.touched) {
          <mat-error>Por favor, selecione um método para liquidar.</mat-error>
        }
      </mat-form-field>
    </mat-card-content>

    <mat-card-footer>
      <button mat-flat-button color="primary" (click)="confirm()" [disabled]="paymentMethodControl.invalid || isLoading">
        <mat-icon>check</mat-icon>
        Confirmar Pagamento
      </button>
      <button mat-button (click)="close()" [disabled]="isLoading">Cancelar</button>
    </mat-card-footer>
  </div>
</mat-card>
